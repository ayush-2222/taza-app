version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taza_news
      POSTGRES_USER: taza_user
      POSTGRES_PASSWORD: taza_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: taza-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:

