services:
  - type: web
    name: taza-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: NEWS_PAGE_SIZE
        value: 10
      - key: SCROLL_FREEZE_LIMIT
        value: 12
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: taza-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
    disk:
      name: taza-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: taza-postgres
    databaseName: taza_news
    postgresMajorVersion: "16"
